<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in · Skill Sharing</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <a href="index.html" class="brand">
      <svg class="brand-mark" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="8" width="12" height="12" rx="4" transform="rotate(-12 8 14)" stroke="#2F6F62" stroke-width="2.4"/>
        <rect x="16" y="10" width="12" height="12" rx="4" transform="rotate(12 22 16)" stroke="#7C4FA0" stroke-width="2.4"/>
      </svg>
      Skill Sharing
    </a>
    <nav class="topnav">
      <a href="index.html">Home</a>
      <a href="login.html" class="active">Log in</a>
      <a href="register.html" class="btn btn-gold btn-sm">Join free</a>
    </nav>
  </header>

  <main class="container">
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="sub">Log in to see your trades and requests.</p>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Log in</button>
      </form>
      <p class="auth-switch">New here? <a href="register.html">Create an account</a></p>
    </div>
  </main>

  <footer class="site-footer">
    Skill Sharing &mdash; trade what you know for what you want to learn.
  </footer>
</div>
<script>
  document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
